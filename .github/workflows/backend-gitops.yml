name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "app/backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:latest

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy container on EC2 using SSM
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:${{ github.sha }}"

          ENV_FILE=$(printf "DATABASE_URL=%s\nJWT_SECRET=%s\nPORT=8080\nCLIENT_URL=%s\n" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.JWT_SECRET }}" \
            "${{ secrets.CLIENT_URL }}" | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -e\",
              \"sudo mkdir -p /opt/lms\",
              \"echo $ENV_FILE | base64 -d | sudo tee /opt/lms/.env >/dev/null\",
              \"sudo docker pull $IMAGE\",
              \"sudo docker rm -f lmsbackend || true\",
              \"sudo docker run -d --name lmsbackend --restart unless-stopped --env-file /opt/lms/.env -p 8080:8080 $IMAGE\",
              \"sleep 10\",
              \"sudo docker exec lmsbackend npx prisma db push\",
              \"curl -f http://localhost:8080/health\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"