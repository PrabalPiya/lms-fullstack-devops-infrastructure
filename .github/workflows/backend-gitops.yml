name: Backend GitOps Deploy

on:
  push:
    branches:
      - main
    paths:
      - "app/backend/**"
      - ".github/workflows/backend-gitops.yml"

permissions:
  contents: write

jobs:
  backend-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:latest

      - name: Update backend Helm image tag
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import os

          values_file = Path("helm/simple-lms/values.yaml")
          sha = os.environ["GITHUB_SHA"]

          text = values_file.read_text()

          text = re.sub(
              r"(repository:\s*xpocky/lmsbackend\s*\n\s*tag:\s*)[^\n]+",
              rf"\g<1>{sha}",
              text
          )

          values_file.write_text(text)
          PY

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/simple-lms/values.yaml

          if git diff --cached --quiet; then
            echo "No Helm changes"
          else
            git commit -m "Update backend image tag to ${{ github.sha }} [skip ci]"
            git push
          fi