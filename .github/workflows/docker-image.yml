name: Build and Push GitOps App

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/docker-image.yml"

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsfrontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsfrontend:latest

      - name: Update Helm image tags
        run: |
          python - <<'PY'
          from pathlib import Path

          values_file = Path("helm/simple-lms/values.yaml")
          sha = "${{ github.sha }}"

          text = values_file.read_text()

          text = text.replace(
              "repository: ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend\n    tag: latest",
              f"repository: ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend\n    tag: {sha}"
          )

          text = text.replace(
              "repository: ${{ secrets.DOCKERHUB_USERNAME }}/lmsfrontend\n    tag: latest",
              f"repository: ${{ secrets.DOCKERHUB_USERNAME }}/lmsfrontend\n    tag: {sha}"
          )

          # Also update if previous tag was already a SHA
          import re

          text = re.sub(
              r"(repository:\s*${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend\s*\n\s*tag:\s*)[a-zA-Z0-9._-]+",
              rf"\g<1>{sha}",
              text
          )

          text = re.sub(
              r"(repository:\s*${{ secrets.DOCKERHUB_USERNAME }}/lmsfrontend\s*\n\s*tag:\s*)[a-zA-Z0-9._-]+",
              rf"\g<1>{sha}",
              text
          )

          values_file.write_text(text)
          PY
      
      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/simple-lms/values.yaml
          git commit -m "Update image tags to ${{ github.sha }} [skip ci]"
          git push
      