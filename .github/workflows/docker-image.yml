name: Build and Push GitOps App

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/docker-image.yml"

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsbackend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsfrontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lmsfrontend:latest