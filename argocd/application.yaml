apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lms
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/PrabalPiya/lms-fullstack-devops-infrastructure.git
    targetRevision: main
    path: helm/simple-lms

  destination:
    server: https://kubernetes.default.svc
    namespace: lms

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true