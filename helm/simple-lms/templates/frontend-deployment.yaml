apiVersion: apps/v1
kind: Deployment
metadata:
  name: lmsfrontend
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lmsfrontend
  template:
    metadata:
      labels:
        app: lmsfrontend
    spec:
      containers:
        - name: lmsfrontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}